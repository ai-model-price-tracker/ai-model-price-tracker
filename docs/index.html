<style>
  :root {

      --card-bg: #1a1a2e; --input-bg: #2a2a3e;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0f0f1a; --bg2: #1a1a2e; --fg: #e0e0e0; --fg2: #999;
    --border: #2a2a3e; --accent: #6c8cff; --green: #2ec4b6; --red: #e63946;
    --card-bg: #1a1a2e; --input-bg: #2a2a3e;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  header { padding: 30px 0 20px; position: relative; display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; }
  .header-left { display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 2em; font-weight: 700; }
  .header-links { font-size: 0.8em; }
  .header-links a { color: var(--accent); text-decoration: none; }
  .header-links a:hover { text-decoration: underline; }
  .header-right { text-align: right; display: flex; align-items: center; gap: 12px; }
  header p { color: var(--fg2); margin-top: 4px; }
  .lang-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--fg); font-size: 0.8em; cursor: pointer; }
  .theme-toggle { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 1em; color: var(--fg); line-height: 1; }
  .theme-toggle:hover { border-color: var(--accent); }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; align-items: center; }
  .controls input, .controls select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--fg); font-size: 0.9em; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .controls input[type="text"] { flex: 1; min-width: 200px; }
  .controls select { min-width: 160px; }
  .controls label { font-size: 0.85em; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .count { font-size: 0.85em; color: var(--fg2); margin-left: auto; }
  table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85em; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td.model-name { white-space: normal; word-break: break-all; max-width: 280px; }
  th { background: var(--bg2); cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 10; font-weight: 600; }
  th:has(.tip:hover) { z-index: 100; }
  th:hover { color: var(--accent); }
  th .arrow { font-size: 0.7em; margin-left: 4px; }
  th .tip { cursor: help; font-size: 0.7em; color: var(--fg2); border: 1px solid var(--border); border-radius: 50%; padding: 0 4px; margin-left: 4px; vertical-align: super; position: relative; }
  th .tip:hover::after { content: attr(data-tip); position: absolute; left: 50%; top: 120%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 4px 10px; border-radius: 6px; font-size: 1.1em; font-weight: 400; white-space: nowrap; z-index: 1000; pointer-events: none; }
  tr:hover { background: var(--bg2); cursor: pointer; }
  .price { font-variant-numeric: tabular-nums; }
  .price-low { color: var(--green); }
  .price-high { color: var(--red); }
  .provider-tag { font-size: 0.75em; padding: 2px 8px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); text-decoration: none; color: var(--fg); }
  a.provider-tag:hover { border-color: var(--accent); color: var(--accent); }
  .source-tag { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; background: var(--bg2); color: var(--fg2); text-decoration: none; }
  a.source-link:hover { border: 1px solid var(--accent); color: var(--accent); }
  .table-wrap { overflow-x: auto; }
  .chart-section { margin: 30px 0; }
  .chart-section h2 { font-size: 1.2em; margin-bottom: 12px; }
  .bar-chart { display: flex; flex-direction: column; gap: 4px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: 0.8em; }
  .bar-label { width: 240px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
  .bar-container { flex: 1; height: 22px; background: var(--bg2); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; color: #fff; font-size: 0.75em; font-weight: 600; min-width: fit-content; }
  .bar-input { background: linear-gradient(90deg, #4361ee, #6c8cff); }
  .bar-output { background: linear-gradient(90deg, #e63946, #ff6b6b); }
  .legend { display: flex; gap: 16px; margin-bottom: 10px; font-size: 0.8em; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  footer { text-align: center; padding: 30px 0; font-size: 0.8em; color: var(--fg2); }
  footer a { color: var(--accent); text-decoration: none; }
  .disclaimer { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; font-size: 0.85em; color: var(--fg2); max-width: 700px; margin: 0 auto; }
  .loading { text-align: center; padding: 60px; font-size: 1.2em; color: var(--fg2); }
  .free-tag { background: var(--green); color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 0.7em; font-weight: 700; }
  .mod-tag { display: inline-block; font-size: 0.7em; padding: 1px 4px; border-radius: 3px; margin: 0 1px; background: var(--bg2); color: var(--fg2); font-weight: 600; border: 1px solid var(--border); }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
  .pagination button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--fg); cursor: pointer; font-size: 0.85em; }
  .pagination button:hover { border-color: var(--accent); color: var(--accent); }
  .pagination button:disabled { opacity: 0.4; cursor: default; border-color: var(--border); color: var(--fg2); }
  .pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pagination .page-info { font-size: 0.85em; color: var(--fg2); }
  .page-size-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--fg); font-size: 0.85em; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 1.4em; cursor: pointer; color: var(--fg2); }
  .modal-close:hover { color: var(--fg); }
  .modal h2 { font-size: 1.2em; margin-bottom: 4px; word-break: break-all; }
  .modal .modal-provider { font-size: 0.85em; color: var(--fg2); margin-bottom: 12px; }
  .modal .modal-desc { font-size: 0.85em; color: var(--fg2); margin-bottom: 16px; line-height: 1.5; }
  .modal-section { margin-bottom: 16px; }
  .modal-section h3 { font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fg2); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; font-size: 0.85em; }
  .modal-grid dt { color: var(--fg2); }
  .modal-grid dd { font-weight: 600; text-align: right; }
  .no-results { text-align: center; padding: 40px; color: var(--fg2); font-size: 1em; }
  @media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .header-right { width: 100%; justify-content: space-between; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .bar-label { width: 140px; font-size: 0.7em; }
    .controls { flex-direction: column; }
    .controls input[type="text"], .controls select { width: 100%; }
    .count { margin-left: 0; }
    /* Hide Cached, InputTypes, OutputTypes on tablet */
    th:nth-child(5), td:nth-child(5),
    th:nth-child(8), td:nth-child(8),
    th:nth-child(9), td:nth-child(9) { display: none; }
  }
  @media (max-width: 480px) {
    /* Also hide MaxOutput and Source on phone */
    th:nth-child(7), td:nth-child(7),
    th:nth-child(10), td:nth-child(10) { display: none; }
  }
</style>

(function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.dataset.theme = saved;
  const btn = document.getElementById('themeToggle');
  function updateIcon() {
    const isDark = document.documentElement.dataset.theme === 'dark' ||
      (!document.documentElement.dataset.theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
    btn.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
  }
  updateIcon();
  btn.addEventListener('click', () => {
    const isDark = document.documentElement.dataset.theme === 'dark' ||
      (!document.documentElement.dataset.theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
    const next = isDark ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('theme', next);
    updateIcon();
  });
})();

const LANG_LABELS = {
  en:'English', ko:'н•ңкөӯм–ҙ', ja:'ж—Ҙжң¬иӘһ', 'zh-CN':'дёӯж–Ү(з®ҖдҪ“)', 'zh-TW':'дёӯж–Ү(з№Ғй«”)',
  es:'EspaГұol', fr:'FranГ§ais', de:'Deutsch', pt:'PortuguГӘs', ru:'Р СғСҒСҒРәРёР№'
};

function detectLang() {
  const saved = localStorage.getItem('lang');
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || '').toLowerCase();
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('ja')) return 'ja';
  if (nav === 'zh-tw' || nav === 'zh-hant') return 'zh-TW';
  if (nav.startsWith('zh')) return 'zh-CN';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('ru')) return 'ru';
  return 'en';
}

let lang = detectLang();
function t(key) { return (I18N[lang] || I18N.en)[key] || I18N.en[key] || key; }

function initLangSelect() {
  const sel = document.getElementById('langSelect');
  for (const [code, label] of Object.entries(LANG_LABELS)) {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = label;
    if (code === lang) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => {
    lang = sel.value;
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang;
    applyI18n();
    if (data) {

      buildTableHead();
      applyFilters();
      renderChart();
    }
  });
}

function applyI18n() {
  document.querySelector('header h1').textContent = t('title');
  document.title = t('title');
  document.getElementById('disclaimer').textContent = t('disclaimer');
  document.getElementById('search').placeholder = t('searchPlaceholder');
  document.getElementById('labelHideFree').textContent = t('hideFree');
  document.getElementById('chartTitle').textContent = t('chartTitle');
  document.getElementById('legendInput').textContent = t('input');
  document.getElementById('legendOutput').textContent = t('output');
  document.getElementById('cmInputDesc').textContent = t('cmInputDesc');
  document.getElementById('cmInputAsc').textContent = t('cmInputAsc');
  document.getElementById('cmOutputDesc').textContent = t('cmOutputDesc');
  document.getElementById('cmOutputAsc').textContent = t('cmOutputAsc');
  document.getElementById('footerSources').innerHTML = t('footerSources');
  document.getElementById('footerIssue').innerHTML = t('footerIssue');
  const pf = document.getElementById('providerFilter');
  if (pf.options.length > 0) pf.options[0].textContent = t('allProviders');
  const sf = document.getElementById('sourceFilter');
  if (sf.options.length > 0) sf.options[0].textContent = t('allSources');
}

// в”Җв”Җв”Җ Columns (dynamic labels) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getColumns() {
  return [
    { key: 'provider', label: t('colProvider'), type: 'string' },
    { key: 'name', label: t('colModel'), type: 'string' },
    { key: 'input_price_per_1m', label: t('colInput'), tip: t('tipInput'), type: 'number' },
    { key: 'output_price_per_1m', label: t('colOutput'), tip: t('tipOutput'), type: 'number' },
    { key: 'cached_input_price_per_1m', label: t('colCached'), tip: t('tipCached'), type: 'number' },
    { key: 'context_length', label: t('colContext'), tip: t('tipContext'), type: 'number' },
    { key: 'max_output_tokens', label: t('colMaxOutput'), tip: t('tipMaxOutput'), type: 'number' },
    { key: 'input_modalities', label: t('colInputMod'), tip: t('tipInputMod'), type: 'modality' },
    { key: 'output_modalities', label: t('colOutputMod'), tip: t('tipOutputMod'), type: 'modality' },
    { key: 'source', label: t('colSource'), tip: t('tipSource'), type: 'string' },
  ];
}

let allModels = [];
let sortKey = 'input_price_per_1m';
let sortAsc = true;
let data = null;
let currentPage = 1;
let pageSize = 30;
let lastFiltered = [];

async function init() {
  initLangSelect();
  applyI18n();
  document.getElementById('updated').textContent = t('loading');

  try {
    const res = await fetch('data/latest.json');
    data = await res.json();
  } catch {
    document.getElementById('updated').textContent = t('failedLoad');
    return;
  }

  document.getElementById('updated').textContent = `${t('lastUpdated')}: ${new Date(data.updated_at).toLocaleString(lang)}`;

  allModels = [];
  for (const p of data.providers) {
    for (const m of p.models) {
      allModels.push({ ...m, provider: p.display_name, official_url: p.official_pricing_url });
    }
  }


  populateProviderFilter(data.providers);
  populateSourceFilter();
  buildTableHead();
  applyFilters();
  renderChart();

  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('providerFilter').addEventListener('change', applyFilters);
  document.getElementById('sourceFilter').addEventListener('change', applyFilters);
  document.getElementById('hideFree').addEventListener('change', applyFilters);
  document.getElementById('chartMode').addEventListener('change', renderChart);

  // Event delegation for table row clicks
  document.getElementById('tableBody').addEventListener('click', (e) => {
    // Don't open modal if clicking a link
    if (e.target.closest('a')) return;
    const tr = e.target.closest('tr');
    if (tr && tr._model) openModal(tr._model);
  });
}


function populateProviderFilter(providers) {
  const sel = document.getElementById('providerFilter');
  sel.innerHTML = `<option value="">${t('allProviders')}</option>`;
  const map = new Map();
  for (const p of providers) {
    map.set(p.display_name, (map.get(p.display_name) || 0) + p.models.length);
  }
  for (const [name, count] of [...map.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = `${name} (${count})`;
    sel.appendChild(opt);
  }
}

function populateSourceFilter() {
  const sel = document.getElementById('sourceFilter');
  sel.innerHTML = `<option value="">${t('allSources')}</option>`;
  const sources = [...new Set(allModels.map(m => m.source))].sort();
  for (const s of sources) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  }
}

function buildTableHead() {
  const tr = document.getElementById('tableHead');
  tr.innerHTML = '';
  for (const col of getColumns()) {
    const th = document.createElement('th');
    th.textContent = col.label;
    if (col.tip) th.innerHTML += `<span class="tip" data-tip="${esc(col.tip)}">?</span>`;
    th.dataset.key = col.key;
    th.tabIndex = 0;
    if (col.key === sortKey) {
      th.innerHTML += `<span class="arrow">${sortAsc ? '&#9650;' : '&#9660;'}</span>`;
      th.setAttribute('aria-sort', sortAsc ? 'ascending' : 'descending');
    }
    const doSort = () => {
      if (sortKey === col.key) { sortAsc = !sortAsc; } else { sortKey = col.key; sortAsc = true; }
      buildTableHead();
      applyFilters();
    };
    th.addEventListener('click', doSort);
    th.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doSort(); } });
    tr.appendChild(th);
  }
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  const provider = document.getElementById('providerFilter').value;
  const source = document.getElementById('sourceFilter').value;
  const hideFree = document.getElementById('hideFree').checked;

  let filtered = allModels.filter(m => {
    if (query && !m.name.toLowerCase().includes(query) && !m.provider.toLowerCase().includes(query) && !m.id.toLowerCase().includes(query)) return false;
    if (provider && m.provider !== provider) return false;
    if (source && m.source !== source) return false;
    if (hideFree && (m.input_price_per_1m == null || m.input_price_per_1m <= 0)) return false;
    return true;
  });

  const columns = getColumns();
  const col = columns.find(c => c.key === sortKey);
  filtered.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    // null always goes to the end regardless of sort direction
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (col?.type === 'modality') { va = Array.isArray(va) ? va.length : 0; vb = Array.isArray(vb) ? vb.length : 0; }
    if (col?.type === 'bool') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (col?.type === 'number' || col?.type === 'bool' || col?.type === 'modality') return sortAsc ? va - vb : vb - va;
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  lastFiltered = filtered;
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const total = lastFiltered.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * pageSize;
  const pageModels = lastFiltered.slice(start, start + pageSize);

  const countOf = (I18N[lang] || I18N.en).countOf || I18N.en.countOf;
  document.getElementById('count').textContent = countOf(lastFiltered.length, allModels.length);
  renderTable(pageModels);
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1 && lastFiltered.length <= 10) { el.innerHTML = ''; return; }

  let html = `<select class="page-size-select" id="pageSizeSelect">`;
  for (const s of [10, 30, 50, 100]) {
    html += `<option value="${s}"${s === pageSize ? ' selected' : ''}>${s} ${t('perPage')}</option>`;
  }
  html += `</select>`;
  html += `<button id="prevPage" ${currentPage <= 1 ? 'disabled' : ''}>&laquo;</button>`;

  const maxBtns = 7;
  let startP = Math.max(1, currentPage - 3);
  let endP = Math.min(totalPages, startP + maxBtns - 1);
  if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);
  for (let i = startP; i <= endP; i++) {
    html += `<button class="page-btn${i === currentPage ? ' active' : ''}" data-page="${i}">${i}</button>`;
  }

  html += `<button id="nextPage" ${currentPage >= totalPages ? 'disabled' : ''}>&raquo;</button>`;
  html += `<span class="page-info">${t('page')} ${currentPage} / ${totalPages}</span>`;
  el.innerHTML = html;

  el.querySelector('#pageSizeSelect').addEventListener('change', (e) => {
    pageSize = parseInt(e.target.value);
    currentPage = 1;
    renderPage();
  });
  el.querySelector('#prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
  el.querySelector('#nextPage').addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(); } });
  el.querySelectorAll('.page-btn').forEach(btn => {
    btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); renderPage(); });
  });
}

function priceClass(val, max) {
  if (val == null || val <= 0 || max <= 0) return '';
  const ratio = val / max;
  if (ratio < 0.15) return 'price-low';
  if (ratio > 0.6) return 'price-high';
  return '';
}

function renderTable(models) {
  const tbody = document.getElementById('tableBody');
  const maxInput = Math.max(...allModels.map(m => m.input_price_per_1m || 0));
  tbody.innerHTML = '';
  if (models.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${getColumns().length}" class="no-results">${t('noResults')}</td></tr>`;
    return;
  }
  const frag = document.createDocumentFragment();
  for (const m of models) {
    const tr = document.createElement('tr');
    const providerCell = m.official_url
      ? `<a href="${esc(m.official_url)}" target="_blank" class="provider-tag">${esc(m.provider)}</a>`
      : `<span class="provider-tag">${esc(m.provider)}</span>`;
    const sourceInfo = {
      'openrouter': { label: 'OpenRouter', url: 'https://openrouter.ai/api/v1/models' },
      'genai-prices': { label: 'genai-prices', url: 'https://github.com/pydantic/genai-prices' },
      'litellm': { label: 'LiteLLM', url: 'https://github.com/BerriAI/litellm' },
      'official': { label: 'Official', url: null },
    }[m.source] || { label: m.source || '-', url: null };
    const sourceCell = sourceInfo.url
      ? `<a href="${esc(sourceInfo.url)}" target="_blank" class="source-tag source-link">${esc(sourceInfo.label)}</a>`
      : `<span class="source-tag">${esc(sourceInfo.label)}</span>`;
    const fmtTokens = (n) => n == null ? '-' : n >= 1000 ? Math.round(n/1000) + 'K' : String(n);
    // Each price cell: null вҶ’ "-", 0 вҶ’ FREE, >0 вҶ’ $value
    const fmtPrice = (v, cls) => {
      if (v == null) return '-';
      if (v <= 0) return `<span class="free-tag">${t('free')}</span>`;
      return `<span class="price ${cls}">$${fmt(v)}</span>`;
    };
    const modelCell = esc(m.name);
    const MOD_ABBR = { text: 'T', image: 'I', audio: 'A', video: 'V', file: 'F' };
    const fmtMod = (arr) => {
      if (!Array.isArray(arr) || arr.length === 0) return '-';
      return arr.map(v => `<span class="mod-tag">${MOD_ABBR[v] || v}</span>`).join('');
    };
    tr.innerHTML = `
      <td>${providerCell}</td>
      <td class="model-name">${modelCell}</td>
      <td>${fmtPrice(m.input_price_per_1m, priceClass(m.input_price_per_1m, maxInput))}</td>
      <td>${fmtPrice(m.output_price_per_1m, priceClass(m.output_price_per_1m, maxInput))}</td>
      <td>${fmtPrice(m.cached_input_price_per_1m, '')}</td>
      <td>${fmtTokens(m.context_length)}</td>
      <td>${fmtTokens(m.max_output_tokens)}</td>
      <td>${fmtMod(m.input_modalities)}</td>
      <td>${fmtMod(m.output_modalities)}</td>
      <td>${sourceCell}</td>
    `;
    tr._model = m;
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
}

function renderChart() {
  const chart = document.getElementById('chart');
  const mode = document.getElementById('chartMode').value;
  const [field, dir] = mode.split('-'); // 'input'|'output', 'desc'|'asc'
  const priceKey = field === 'output' ? 'output_price_per_1m' : 'input_price_per_1m';

  // Deduplicate: keep the entry with highest price for that field
  const byName = new Map();
  for (const m of allModels) {
    if (!m.input_price_per_1m || m.input_price_per_1m <= 0 || !m.output_price_per_1m || m.output_price_per_1m <= 0) continue;
    const key = m.name;
    if (!byName.has(key) || byName.get(key)[priceKey] < m[priceKey]) byName.set(key, m);
  }
  const priced = [...byName.values()]
    .sort((a, b) => dir === 'asc' ? a[priceKey] - b[priceKey] : b[priceKey] - a[priceKey])
    .slice(0, 20);
  if (priced.length === 0) return;
  const maxPrice = Math.max(...priced.map(m => Math.max(m.input_price_per_1m, m.output_price_per_1m)));
  chart.innerHTML = priced.map(m => {
    const inW = (m.input_price_per_1m / maxPrice * 100).toFixed(1);
    const outW = (m.output_price_per_1m / maxPrice * 100).toFixed(1);
    return `
      <div class="bar-row">
        <div class="bar-label" title="${esc(m.provider)}: ${esc(m.name)}">${esc(m.name)}</div>
        <div class="bar-container"><div class="bar-fill bar-input" style="width:${inW}%">$${fmt(m.input_price_per_1m)}</div></div>
        <div class="bar-container"><div class="bar-fill bar-output" style="width:${outW}%">$${fmt(m.output_price_per_1m)}</div></div>
      </div>`;
  }).join('');
}

function fmt(n) {
  if (n == null) return '-';
  if (n >= 1) return n.toFixed(2);
  if (n >= 0.01) return n.toFixed(3);
  return n.toFixed(4);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// в”Җв”Җв”Җ Model Detail Modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openModal(m) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  const fmtP = (v) => v == null ? '-' : v <= 0 ? t('free') : '$' + fmt(v);
  const fmtT = (n) => n == null ? '-' : n >= 1000 ? Math.round(n/1000) + 'K' : String(n);
  const bool = (v) => v === true ? t('yes') : v === false ? t('no') : '-';
  const arr = (v) => Array.isArray(v) ? v.join(', ') : '-';

  const sections = [];

  const sec = (title, rows, breakVal) => {
    const filtered = rows.filter(([,v]) => v !== '-');
    if (!filtered.length) return '';
    const ddStyle = breakVal ? ' style="word-break:break-all"' : '';
    return `<div class="modal-section"><h3>${title}</h3><dl class="modal-grid">${filtered.map(([k,v]) => `<dt>${k}</dt><dd${ddStyle}>${v}</dd>`).join('')}</dl></div>`;
  };

  // Pricing
  sections.push(sec(t('secPricing'), [
    [t('mInputPrice'), fmtP(m.input_price_per_1m)],
    [t('mOutputPrice'), fmtP(m.output_price_per_1m)],
    [t('mCachedPrice'), fmtP(m.cached_input_price_per_1m)],
    ['Cache Write / 1M', fmtP(m.input_cache_write_price_per_1m)],
    ['Batch Input / 1M', fmtP(m.batch_input_price_per_1m)],
    ['Batch Output / 1M', fmtP(m.batch_output_price_per_1m)],
    ['Reasoning Output / 1M', fmtP(m.output_reasoning_price_per_1m)],
    ['Audio Input / 1M', fmtP(m.input_audio_price_per_1m)],
    ['Audio Output / 1M', fmtP(m.output_audio_price_per_1m)],
    ['Image / 1M', fmtP(m.image_price_per_1m)],
    ['Internal Reasoning / 1M', fmtP(m.internal_reasoning_price_per_1m)],
    ['Web Search / req', m.web_search_price_per_request != null ? '$' + fmt(m.web_search_price_per_request) : '-'],
  ]));

  // Limits
  sections.push(sec(t('secLimits'), [
    [t('mContextLen'), fmtT(m.context_length)],
    [t('mMaxOutput'), fmtT(m.max_output_tokens)],
    ['Max Completion Tokens', fmtT(m.max_completion_tokens)],
    ['Max Images / Prompt', m.max_images_per_prompt != null ? String(m.max_images_per_prompt) : '-'],
  ]));

  // Capabilities
  sections.push(sec(t('secCaps'), [
    [t('mVision'), bool(m.supports_vision)],
    [t('mFuncCall'), bool(m.supports_function_calling)],
    ['Parallel Function Calling', bool(m.supports_parallel_function_calling)],
    [t('mStreaming'), bool(m.supports_streaming)],
    ['Response Schema', bool(m.supports_response_schema)],
    ['Prompt Caching', bool(m.supports_prompt_caching)],
    ['PDF Input', bool(m.supports_pdf_input)],
    ['Audio Input', bool(m.supports_audio_input)],
    ['Audio Output', bool(m.supports_audio_output)],
    ['Web Search', bool(m.supports_web_search)],
    ['Reasoning', bool(m.supports_reasoning)],
    ['Computer Use', bool(m.supports_computer_use)],
  ]));

  // Architecture
  sections.push(sec(t('secArch'), [
    [t('mInputMod'), arr(m.input_modalities)],
    [t('mOutputMod'), arr(m.output_modalities)],
    ['Tokenizer', m.tokenizer || '-'],
  ]));

  // Info
  const officialLink = m.official_url ? `<a href="${esc(m.official_url)}" target="_blank" style="color:var(--accent)">${esc(m.official_url)}</a>` : null;
  sections.push(sec(t('secInfo'), [
    [t('mSource'), m.source || '-'],
    ['ID', m.id || '-'],
    [t('mCreated'), m.created ? new Date(m.created * 1000).toLocaleDateString(lang) : '-'],
    ['Deprecated', m.deprecated === true ? t('yes') : '-'],
    ['Official Page', officialLink || '-'],
  ], true));

  content.innerHTML = `
    <h2>${esc(m.name)}</h2>
    <div class="modal-provider">${esc(m.provider)}</div>
    ${m.description ? `<div class="modal-desc">${esc(m.description)}</div>` : ''}
    ${sections.join('')}
  `;
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

init();
</script>
</body>
</html>
