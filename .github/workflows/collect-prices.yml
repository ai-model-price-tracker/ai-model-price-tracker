name: Collect AI Model Prices

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  collect:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.50.0-noble
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Scrape official pricing pages
        run: node scripts/scrape-official.mjs

      - name: Collect prices from APIs
        id: collect
        run: |
          set +e
          node scripts/collect-prices.mjs
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -eq 1 ]; then
            echo "::error::All data sources failed or no data collected"
            exit 1
          fi
          exit 0

      - name: Validate output
        if: success()
        run: node scripts/validate.mjs

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ docs/latest.json
          git diff --staged --quiet || git commit -m "Update prices for $(date +%Y-%m-%d)"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Price collection failed on ${new Date().toISOString().slice(0, 10)}`;
            const body = `The daily price collection workflow failed.\n\n` +
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `Please check the workflow logs for details.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'collection-failure',
              per_page: 1,
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['collection-failure'],
              });
            }
